<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACNA · Centro de Comando — Reforma de Jornada 2027–2030</title>
<style>
  :root{
    --ink:#1A1A1D; --ink2:#26262B; --rail-mut:#9A9AA2; --rail-txt:#E7E7EA;
    --bg:#F5F6F8; --panel:#FFFFFF; --line:#E3E7ED; --line2:#EDF0F4;
    --tx:#15202E; --tx2:#5A6679; --tx3:#8A94A6;
    --acc:#BC1401; --acc-d:#9A1001; --acc-s:#FBEAE7;
    --ok:#0E9F6E; --ok-s:#E7F6EF; --warn:#C97C0A; --warn-s:#FBF1DF;
    --bad:#E11D48; --bad-s:#FCE8EC; --slate:#64748B; --slate-s:#EEF1F5;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  #root{font-family:var(--sans);color:var(--tx);background:var(--bg);display:flex;min-height:680px;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:15px;line-height:1.5}
  .rail{width:230px;flex:0 0 230px;background:var(--ink);color:var(--rail-txt);display:flex;flex-direction:column;padding:0}
  .brand{padding:18px 18px 14px;border-bottom:1px solid #2E2E34}
  .brand b{color:#fff;font-size:15px;letter-spacing:.3px;font-weight:700}
  .logo{display:block;height:26px;width:auto;margin:0 0 3px}
  .brand span{display:block;color:var(--rail-mut);font-size:11px;margin-top:3px;letter-spacing:.2px}
  .nav{padding:10px 10px 4px}
  .nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:var(--rail-txt);padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--sans)}
  .nav button:hover{background:#26262B}
  .nav button.on{background:var(--acc);color:#fff;font-weight:600}
  .nav .dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.65}
  .railfoot{margin-top:auto;padding:14px;border-top:1px solid #2E2E34}
  .yr{display:block;color:var(--rail-mut);font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
  .yrtabs{display:flex;gap:4px;flex-wrap:wrap}
  .yrtabs button{flex:1;min-width:42px;background:#26262B;border:1px solid #3A3A42;color:var(--rail-txt);border-radius:6px;padding:6px 0;font-size:12px;cursor:pointer;font-family:var(--mono)}
  .yrtabs button.on{background:#fff;color:var(--ink);font-weight:700;border-color:#fff}
  .save{margin-top:12px;font-size:10.5px;color:var(--rail-mut);display:flex;align-items:center;gap:6px}
  .save .s{width:6px;height:6px;border-radius:50%;background:var(--ok)}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{padding:16px 22px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-end;gap:16px}
  .top h1{margin:0;font-size:18px;font-weight:700;letter-spacing:-.2px}
  .top p{margin:3px 0 0;color:var(--tx2);font-size:12.5px}
  .scroll{flex:1;overflow:auto;padding:18px 22px 40px}
  .banner{background:var(--acc-s);border:1px solid #F1C9C2;color:#8A1001;border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:16px;display:flex;gap:8px;align-items:flex-start}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 14px}
  .kpi .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);font-weight:600}
  .kpi .v{font-family:var(--mono);font-size:24px;font-weight:600;margin-top:6px;letter-spacing:-.5px}
  .kpi .sub{font-size:11px;color:var(--tx2);margin-top:2px}
  .kpi.acc .v{color:var(--acc)}
  .ring{--p:0;width:46px;height:46px;border-radius:50%;background:conic-gradient(var(--ok) calc(var(--p)*1%),var(--line) 0);display:flex;align-items:center;justify-content:center;flex:0 0 46px}
  .ring i{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-style:normal;font-family:var(--mono);font-size:11px;font-weight:700}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:18px;overflow:hidden}
  .ph{padding:12px 16px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center}
  .ph h2{margin:0;font-size:13px;font-weight:700}
  .ph .hint{font-size:11.5px;color:var(--tx3)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .filters input,.filters select{font-family:var(--sans);font-size:14px;padding:7px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--tx)}
  .filters input{flex:1;min-width:160px}
  .chip{font-size:12.5px;padding:5px 10px;border-radius:20px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--tx2)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);background:#FAFBFC;position:sticky;top:0}
  td{padding:9px 12px;border-bottom:1px solid var(--line2);font-size:14px;vertical-align:middle}
  tr.row{cursor:pointer}
  tr.row:hover td{background:#F8FAFB}
  .num{font-family:var(--mono);text-align:right}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .pill .d{width:6px;height:6px;border-radius:50%;background:currentColor}
  tr.cluhdr td{background:var(--ink);color:#fff;font-weight:700;font-size:13px;letter-spacing:.4px;padding:8px 12px;border-bottom:none}
  tr.cluhdr td .csub{color:var(--rail-mut);font-weight:500;font-size:11.5px;margin-left:10px}
  .p-ok{background:var(--ok-s);color:#0a7a54}.p-prog{background:var(--warn-s);color:#9a5d05}
  .p-none{background:var(--slate-s);color:#475569}.p-risk{background:var(--bad-s);color:#b3123a}.p-acc{background:var(--acc-s);color:#8A1001}
  .mini{height:6px;background:var(--line);border-radius:4px;overflow:hidden;min-width:54px}
  .mini i{display:block;height:100%;background:var(--ok)}
  .cls{font-family:var(--mono);font-size:10.5px;padding:2px 6px;border-radius:5px;background:var(--slate-s);color:#334155}
  .cls.Nocturna{background:#2E2E34;color:#cdd8ea}.cls.Mixta{background:#EDE3F7;color:#6b3fa0}
  .gapwarn{color:var(--bad);font-weight:600}.gapok{color:var(--ok)}
  /* detail */
  .ov{position:absolute;inset:0;background:rgba(14,23,38,.42);display:flex;justify-content:flex-end;z-index:30}
  .draw{width:min(880px,96%);background:var(--bg);height:100%;overflow:auto;box-shadow:-10px 0 40px rgba(0,0,0,.2);animation:sl .18s ease}
  @keyframes sl{from{transform:translateX(24px);opacity:.6}to{transform:none;opacity:1}}
  .dh{position:sticky;top:0;background:var(--ink);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;z-index:2}
  .dh h2{margin:0;font-size:17px}.dh .meta{color:var(--rail-mut);font-size:12px;margin-top:4px}
  .dh button{background:#34343C;border:none;color:#fff;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:16px}
  .dbody{padding:18px 20px 60px}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:15px 16px;margin-bottom:14px}
  .card h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .fld label{display:block;font-size:11px;color:var(--tx2);margin-bottom:4px;font-weight:600}
  .fld input,.fld select,.fld textarea{width:100%;font-family:var(--sans);font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--tx)}
  .fld .pre{position:relative}.fld .pre span{position:absolute;left:10px;top:9px;color:var(--tx3);font-size:12px}
  .fld .pre input{padding-left:24px;font-family:var(--mono)}
  .shwrap{overflow-x:auto}
  .shtbl{min-width:640px}
  .shtbl td,.shtbl th{padding:7px 5px;font-size:13px;white-space:nowrap}
  .shtbl input,.shtbl select{width:100%;font-size:13px;padding:5px 5px;border:1px solid var(--line);border-radius:6px;font-family:var(--mono);text-align:center}
  .shtbl select{font-family:var(--sans);min-width:88px;text-align:left}
  .shtbl input[type=number]{-moz-appearance:textfield;appearance:textfield}
  .shtbl input[type=number]::-webkit-outer-spin-button,.shtbl input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .ramp{display:flex;gap:8px;margin:4px 0 2px}
  .step{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px;text-align:center;background:#fff}
  .step.active{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-s)}
  .step .y{font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:.5px}
  .step .h{font-family:var(--mono);font-size:16px;font-weight:700;margin:3px 0}
  .step .g{font-family:var(--mono);font-size:11px}
  .routes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  .route{border:1px solid var(--line);border-radius:9px;padding:12px;background:#fff}
  .route.best{border-color:var(--ok);background:var(--ok-s)}
  .route .rt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--tx2);display:flex;justify-content:space-between}
  .route .rc{font-family:var(--mono);font-size:18px;font-weight:700;margin:7px 0 2px}
  .route .rd{font-size:11px;color:var(--tx2);line-height:1.5}
  .route.warnf{border-color:var(--warn);background:var(--warn-s)}
  .slider{margin:8px 0 2px}
  .slider input{width:100%}
  .chk{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--line2);font-size:13px}
  .chk:last-child{border-bottom:none}
  .chk input{width:16px;height:16px;accent-color:var(--acc)}
  .chk .na{font-size:10px;color:var(--tx3);margin-left:auto;font-family:var(--mono)}
  .btn{background:var(--acc);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans)}
  .btn.ghost{background:#fff;color:var(--tx);border:1px solid var(--line)}
  .small{font-size:12px;color:var(--tx3)}
  .refgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .note{font-size:12.5px;color:var(--tx2);background:var(--warn-s);border:1px solid #f0dcae;border-radius:8px;padding:9px 11px;margin-top:6px}
  .note.ok{background:#e8f5ec;border-color:#bfe3c8}.note.bad{background:#fdecea;border-color:#f2c1bb}.note.info{background:#eef3f9;border-color:#ccd9ea}

  /* --- guía estratégica --- */
  .vd{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:20px;text-transform:uppercase}
  .vd.ok{background:var(--ok-s);color:#0E9F6E}.vd.warn{background:var(--warn-s);color:#9a5d05}.vd.bad{background:#FBEAE7;color:#BC1401}
  .decstrip{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .decstrip .dc{background:#F7F9FA;border:1px solid var(--line);border-radius:8px;padding:8px 12px;text-align:center;min-width:64px}
  .decstrip .dc b{display:block;font-family:var(--mono);font-size:15px;color:var(--acc)}
  .decstrip .dc span{font-size:11px;color:var(--tx3)}
  .fam{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:12px;background:#fff}
  .fam.dead{background:#FBFBFC;opacity:.92}
  .fam h4{margin:0 0 4px;font-size:14.5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .fam .why{font-size:12.5px;color:var(--tx2);margin:6px 0 8px;line-height:1.55}
  .fam table{width:100%;border-collapse:collapse;margin-top:4px}
  .fam th,.fam td{padding:5px 8px;font-size:12.5px;border-bottom:1px solid var(--line2);text-align:left}
  .fam th{font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--tx3)}
  .fam td.mono{font-family:var(--mono)}
  .fam td.strike{text-decoration:line-through;color:var(--tx3)}
  .brk{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
  .brk .b{flex:1;min-width:180px;border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#fff}
  .brk .b b{font-family:var(--mono);font-size:19px;color:var(--acc);display:block}
  .brk .b .t{font-size:12px;color:var(--tx2);line-height:1.5;margin-top:4px}
  .reco{background:linear-gradient(135deg,#1A1A1D,#26262B);color:#E7E7EA;border-radius:12px;padding:18px 20px;margin-bottom:18px}
  .reco h3{margin:0 0 8px;color:#fff;font-size:16px}
  .reco p{font-size:13px;line-height:1.65;color:#C9C9D0;margin:6px 0}
  .reco .pill{display:inline-block;background:rgba(188,20,1,.25);border:1px solid #BC1401;color:#ffb3a8;border-radius:20px;font-size:11px;padding:3px 10px;margin:3px 4px 0 0}

  /* --- control de tamaño de letra --- */
  .zoomctl{padding:10px 14px;border-top:1px solid #2E2E34}
  .zoomctl .zl{font-size:10.5px;color:var(--rail-mut);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
  .zoomctl .zbtns{display:flex;gap:6px;align-items:center}
  .zoomctl button{flex:0 0 auto;background:#2E2E34;border:none;color:var(--rail-txt);width:34px;height:30px;border-radius:7px;cursor:pointer;font-size:15px;font-weight:700}
  .zoomctl button:hover{background:#3A3A42}
  .zoomctl .zv{flex:1;text-align:center;font-family:var(--mono);font-size:13px;color:var(--rail-txt)}
  @media(max-width:880px){.rail{display:none}.kpis{grid-template-columns:repeat(2,1fr)}.routes{grid-template-columns:1fr}.grid2,.grid3{grid-template-columns:1fr}}

  /* ---- shift designer ---- */
  .stepyr{display:flex;gap:6px;margin:2px 0 12px;flex-wrap:wrap}
  .stepyr button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 13px;font-family:var(--mono);font-size:12.5px;cursor:pointer;color:var(--tx2)}
  .stepyr button.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:700}
  .stepyr button .gm{display:block;font-size:9.5px;letter-spacing:.4px;opacity:.7;font-family:var(--sans);margin-top:1px}
  .shift-block{border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .shift-hd{background:#F7F9FA;padding:10px 14px;border-bottom:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .shift-hd b{font-size:13px}
  .shift-hd .mt{font-size:11px;color:var(--tx2);font-family:var(--mono)}
  .week{display:flex;gap:5px;align-items:flex-end}
  .day{flex:1;text-align:center;min-width:0}
  .day .bar-wrap{height:84px;display:flex;align-items:flex-end;justify-content:center}
  .day .bar{width:74%;max-width:30px;border-radius:4px 4px 2px 2px;background:linear-gradient(180deg,var(--acc),#9A1001);position:relative;transition:height .18s}
  .day.over .bar{background:linear-gradient(180deg,#f0a23a,#d9930a)}
  .day.bad .bar{background:linear-gradient(180deg,#f0577b,#e11d48)}
  .day .dl{font-size:10px;color:var(--tx3);font-weight:700;margin-top:5px}
  .day .dh{font-family:var(--mono);font-size:11px;font-weight:600}
  .day .dx{font-family:var(--mono);font-size:9.5px;color:var(--tx3)}
  .day.rest .bar-wrap{align-items:center}
  .day.rest .rz{font-size:9px;color:var(--tx3);writing-mode:vertical-rl;transform:rotate(180deg);opacity:.6}
  .sopt{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff;cursor:pointer;transition:border-color .15s,box-shadow .15s}
  .sopt:hover{border-color:#c9d3dd}
  .sopt.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-s);background:#fcffff}
  .sopt.cur{border-style:dashed;background:#FAFBFC;cursor:default}
  .sopt-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
  .sopt-hd .nm{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px}
  .sopt-hd .badges{display:flex;gap:6px;flex-wrap:wrap}
  .bdg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;font-family:var(--mono)}
  .bdg.ok{background:var(--ok-s);color:#0a7a54}.bdg.wa{background:var(--warn-s);color:#9a5d05}.bdg.er{background:var(--bad-s);color:#b3123a}.bdg.nu{background:var(--slate-s);color:#475569}
  .selbtn{border:1px solid var(--acc);color:var(--acc-d);background:#fff;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .selbtn.is{background:var(--acc);color:#fff}
  .cust td{padding:4px}.cust input{width:54px;font-family:var(--mono);font-size:12px;padding:5px;border:1px solid var(--line);border-radius:6px;text-align:center}
  .legend{font-size:10.5px;color:var(--tx3);display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
  .legend span{display:flex;align-items:center;gap:5px}.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  /* ---- schedule table (formato horario) ---- */
  .sched{border-collapse:collapse;width:100%;margin:5px 0;table-layout:fixed}
  .sched th,.sched td{border:1px solid var(--line);padding:6px 6px;text-align:center;font-size:12.5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .sched th{background:#F2F5F7;font-weight:600;color:var(--tx2);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
  .sched tr.sdh{position:static;background:none;color:inherit;padding:0;display:table-row}
  .sched .hr td{font-family:var(--mono);font-weight:700}
  .sched .tm td{font-family:var(--mono);color:var(--tx2);font-size:10.5px}
  .sched td.over{background:var(--warn-s);color:#9a5d05}
  .sched td.bad{background:var(--bad-s);color:#b3123a}
  .sched td.tot{background:#F7F9FA;font-weight:700}
  .sched td.rest{background:#F2F5F7;color:var(--tx3);font-style:italic}
  .prop{border:1px solid var(--line);border-radius:9px;padding:11px 12px;margin:8px 0;background:#fff}
  .prop.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-s)}
  .prop .ph2{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px}
  .prop .ph2 .nm{font-size:12.5px;font-weight:700}
  .prop .ph2 .pr{font-family:var(--mono);font-size:11px;color:var(--tx2)}
  .comments{background:#FAFBFC;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-top:10px}
  .comments h4{margin:0 0 6px;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2)}
  .cmt{display:flex;gap:8px;padding:5px 0;font-size:12px;border-bottom:1px solid var(--line2);align-items:flex-start;line-height:1.4}
  .cmt:last-child{border-bottom:none}
  .cmt .ic{flex:0 0 14px;text-align:center}
  .cmt.info .ic{color:var(--acc)}.cmt.ok .ic{color:var(--ok)}.cmt.warn .ic{color:var(--warn)}.cmt.bad .ic{color:var(--bad)}

function genSchemes(s,Ht){
  const D=+s.daysPerWeek||5, Hc=+s.weeklyHours, cd=Hc/D, out=[];
  out.push({key:'parejo',name:'Parejo',sub:'mismo horario los '+D+' días',days:Array(D).fill(r1(Ht/D))});
  let last=r1(Ht-cd*(D-1));
  if(last>0.05&&last<=cd+0.05)out.push({key:'corto',name:'Último día corto',sub:'mantiene el ritmo actual y libera el cierre',days:[...Array(D-1).fill(r1(cd)),last]});
  let b8=r1((Ht-8)/(D-1));if(b8>0&&b8<=12)out.push({key:'limpio8',name:'Último día limpio (8 h)',sub:'cierre estándar de 8 h',days:[...Array(D-1).fill(b8),8]});
  if(D>3){let dd=r1(Ht/(D-1));out.push({key:'comp',name:'Comprimir a '+(D-1)+' días',sub:'un día de descanso adicional',days:Array(D-1).fill(dd),rest:1});}
  return out;
}
function schemeMetrics(s,days){
  const meal=+s.mealMin||0,counts=!!s.mealCounts,start=+s.startMin||parseStart(s.range);
  const cells=days.map(oh=>{const presence=counts?oh*60:oh*60+meal;const o=start+presence;return{oh,out:o,cls:classifyShift(start,o),over:oh>10.5+0.001,bad:oh>12+0.001};});
  const total=r1(days.reduce((a,b)=>a+b,0));
  return{cells,total,maxOh:Math.max(...days),classChange:cells.some(c=>c.cls!==s.classification),changedCls:(cells.find(c=>c.cls!==s.classification)||{}).cls,anyBad:cells.some(c=>c.bad),anyOver:cells.some(c=>c.over),anyShort:days.some(d=>d<3-0.001),start};
}

function parseCSV(text){
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true;
      else if(ch===','){row.push(cur);cur='';}
      else if(ch==='\n'||ch==='\r'){ if(ch==='\r'&&text[i+1]==='\n')i++; row.push(cur);cur=''; if(row.some(c=>c!==''))rows.push(row); row=[]; }
      else cur+=ch; } }
  if(cur!==''||row.length){row.push(cur);if(row.some(c=>c!==''))rows.push(row);}
  return rows;
}

  for(let k=1;k<rows.length;k++){const r0=rows[k];const name=(r0[iName]||'').trim();if(!name)continue;

      code:(iCode>=0?(r0[iCode]||''):'').trim()||('T'+(map[key].shifts.length+1)),
      weeklyHours:parseFloat((r0[iHrs]||'').replace(',','.'))||0,

      range:(r0[iRng]||'').trim(),
      break:iBrk>=0?(r0[iBrk]||'').trim():'',
      classification:['Diurna','Mixta','Nocturna'].includes(cls)?cls:'Diurna',
      hc:null,
      verified:iVer>=0?((r0[iVer]||'').trim().toUpperCase().indexOf('S')===0):true
    });
    if(iNotes>=0&&(r0[iNotes]||'').trim()&&!map[key].notes)map[key].notes=(r0[iNotes]||'').trim();
  }
  return map;
}

/* ---------- model ---------- */
function shiftHC(c,s){ if(s.hc!=null&&s.hc!=='')return +s.hc; const unset=c.shifts.filter(x=>x.hc==null||x.hc===''); if(unset.length===c.shifts.length)return Math.round(c.hc/c.shifts.length); return 0; }
function calcShift(c,s,year){
  const cap=RAMP[s.classification]?.[year]??RAMP.Diurna[year];
  const Hc=+s.weeklyHours, D=+s.daysPerWeek||5, hc=shiftHC(c,s);
  const gapPerHead=Math.max(0,Hc-cap);
  const Sd=(s.salary!=null&&s.salary!=='')?+s.salary:(c.dailySalary?+c.dailySalary:null);
  const cuotaNueva=Sd?Sd*D/cap:null;
  const otPerHour=cuotaNueva?2*cuotaNueva*(1+(+c.burden||0)):null;
  const gapTot=gapPerHead*hc;
  const otCapY=OTCAP[year];
  const otPerHead=Math.min(gapPerHead,otCapY);
  const residPerHead=gapPerHead-otPerHead;
  const otFeasible=residPerHead<=0.001;
  const weeklyOT=cuotaNueva?otPerHead*hc*2*cuotaNueva*(1+(+c.burden||0)):null;
  const headsNeeded=cap>0?Math.ceil(gapTot/cap):0;
  const weeklyHead=Sd?headsNeeded*Sd*7*(1+(+c.burden||0)):null;
  const headPerYr=Sd?Sd*7*(1+(+c.burden||0))*52:null;
  return{cap,Hc,D,hc,gapPerHead,gapTot,cuotaNueva,otPerHour,otPerHead,residPerHead,otFeasible,weeklyOT,headsNeeded,weeklyHead,headPerYr,Sd};
}
function calcClient(c,year){
  let gapTot=0,otW=0,headW=0,heads=0,otFeasibleAll=true,priced=true,hasGap=false;
  c.shifts.forEach(s=>{const r=calcShift(c,s,year);gapTot+=r.gapTot;if(r.gapPerHead>0)hasGap=true;
    if(r.weeklyOT==null||r.weeklyHead==null)priced=false;else{otW+=r.weeklyOT;headW+=r.weeklyHead;}
    heads+=r.headsNeeded; if(!r.otFeasible&&r.gapTot>0)otFeasibleAll=false;});
  const otAnnual=priced?otW*52:null, headAnnual=priced?headW*52:null;
  const path=c.path||'auto'; const mixPct=c.mixPct==null?50:+c.mixPct;
  let chosenAnnual=null,chosenLabel='';
  if(priced){
    const otVal=otFeasibleAll?otAnnual:Infinity;
    if(path==='ot'){chosenAnnual=otFeasibleAll?otAnnual:headAnnual;chosenLabel=otFeasibleAll?'Tiempo extra':'Plantilla (OT topado)';}
    else if(path==='headcount'){chosenAnnual=headAnnual;chosenLabel='Plantilla';}
    else if(path==='mix'){chosenAnnual=(otAnnual*mixPct/100*(otFeasibleAll?1:1)+headAnnual*(100-mixPct)/100);chosenLabel='Mezcla '+mixPct+'/'+(100-mixPct);}
    else{ if(otVal<=headAnnual){chosenAnnual=otAnnual;chosenLabel='Tiempo extra';}else{chosenAnnual=headAnnual;chosenLabel='Plantilla';} }
  }
  return{gapTot,heads,otAnnual,headAnnual,otFeasibleAll,priced,hasGap,chosenAnnual,chosenLabel};
}
const CHECKS=[
 {k:'sup',t:'Supervisor sr asignado',auto:c=>!!c.supervisor},
 {k:'sal',t:'Salario diario capturado',auto:c=>c.dailySalary!=null&&c.dailySalary!==''},
 {k:'turn',t:'Turnos verificados y HC por turno',auto:c=>c.shifts.every(s=>s.verified&&s.hc!=null&&s.hc!=='')},

 {k:'estr',t:'Estrategia definida (ruta)',auto:c=>!!c.path&&c.path!=='auto'},
 {k:'conv',t:'Convenio Art. 59 con sindicato',na:c=>(+c.union||0)===0},
 {k:'reg',t:'Registro electrónico de jornada listo',auto:null},
 {k:'com',t:'Comunicación oficial al personal',auto:null},
];
function pct(c){
  let done=0,tot=0;
  CHECKS.forEach(ck=>{ if(ck.na&&ck.na(c))return; tot++; const v=(c.checks&&c.checks[ck.k]!=null)?c.checks[ck.k]:(ck.auto?ck.auto(c):false); if(v)done++; });
  return tot?Math.round(done/tot*100):0;
}

const ZOOMS=[90,100,110,125,140,160,180];
function getZoom(){try{const z=+localStorage.getItem('tacna_zoom');return ZOOMS.includes(z)?z:100;}catch(_){return 100;}}
function applyZoom(z){
  try{localStorage.setItem('tacna_zoom',z);}catch(_){}
  document.body.style.zoom=z+'%';
  if(!('zoom' in document.body.style)||getComputedStyle(document.body).zoom===undefined){
    document.body.style.fontSize=z+'%';
  }
  const v=document.getElementById('zoomVal');if(v)v.textContent=z+'%';
}
function zoomCtl(){
  const box=el('<div class="zoomctl"><span class="zl">Tamaño de letra</span></div>');
  const row=el('<div class="zbtns"></div>');
  const minus=el('<button title="Reducir">A−</button>');
  const val=el('<span class="zv" id="zoomVal">'+getZoom()+'%</span>');
  const plus=el('<button title="Aumentar">A+</button>');
  minus.onclick=()=>{const i=ZOOMS.indexOf(getZoom());if(i>0)applyZoom(ZOOMS[i-1]);};
  plus.onclick=()=>{const i=ZOOMS.indexOf(getZoom());if(i<ZOOMS.length-1)applyZoom(ZOOMS[i+1]);};
  val.ondblclick=()=>applyZoom(100);
  row.appendChild(minus);row.appendChild(val);row.appendChild(plus);
  box.appendChild(row);
  return box;
}

function topEl(){
  const titles={portfolio:['Portafolio de clientes','Avance de preparación y costo full-burden estimado por año objetivo'],
    behind:['Clientes rezagados','Prioriza captura y convenios antes del 1-ene-2027'],
    strategy:['Guía estratégica de jornadas','Del pizarrón a la propuesta: la clave decimal, los descansos 30/36/42 y el veredicto de cada familia de horario'],
    assump:['Supuestos y referencia legal','Parámetros del modelo y topes estatutarios (Art. 60–68 LFT, reforma 2026)']};

  return el('<div class="top"><div><h1>'+h+'</h1><p>'+p+'</p></div><div class="small">Año objetivo: <b style="font-family:var(--mono);color:var(--tx)">'+STATE.year+'</b></div></div>');

function portfolioEl(){
  const wrap=el('<div></div>');
  wrap.appendChild(el('<div class="banner"><span>⬢</span><div>'+(SHARED_MODE?'Los datos que captures se <b>guardan y comparten</b> con todo el equipo que abra este tablero. Cada supervisor sr llena su cliente; dirección monitorea el avance aquí.':'Modo <b>local</b>: lo que captures se guarda <b>solo en este navegador</b> (no se comparte entre personas). Para una fuente única de avance del equipo, conecta un backend — ver README.')+'</div></div>'));
  // KPIs
  let comp=0,prog=0,none=0,gapClients=0,hcImpact=0,annual=0,priced=0,unpriced=0;
  DATA.forEach(c=>{const st=statusOf(c);if(st==='Completo')comp++;else if(st==='En progreso')prog++;else none++;
    const r=calcClient(c,STATE.year); if(r.hasGap){gapClients++;hcImpact+=c.hc;}
    if(r.priced&&r.chosenAnnual!=null){annual+=r.chosenAnnual;priced++;}else if(r.hasGap)unpriced++;});
  const avg=Math.round(DATA.reduce((a,c)=>a+pct(c),0)/DATA.length);
  const k=el('<div class="kpis"></div>');
  k.appendChild(el('<div class="kpi"><div class="l">Avance global</div><div style="display:flex;align-items:center;gap:10px;margin-top:4px"><div class="ring" style="--p:'+avg+'"><i>'+avg+'%</i></div><div class="sub">'+comp+' completos · '+prog+' en progreso · '+none+' sin iniciar</div></div></div>'));
  k.appendChild(el('<div class="kpi"><div class="l">Clientes activos</div><div class="v">'+DATA.filter(c=>c.hc>0).length+'</div><div class="sub">'+fmtN(DATA.reduce((a,c)=>a+c.hc,0))+' empleados</div></div>'));
  k.appendChild(el('<div class="kpi"><div class="l">Con brecha en '+STATE.year+'</div><div class="v">'+gapClients+'</div><div class="sub">'+fmtN(hcImpact)+' HC impactado</div></div>'));
  k.appendChild(el('<div class="kpi acc"><div class="l">Costo anual estimado</div><div class="v">'+fmtMk(annual)+'</div><div class="sub">ruta óptima · '+priced+' costeados'+(unpriced?' · '+unpriced+' sin salario':'')+'</div></div>'));
  k.appendChild(el('<div class="kpi"><div class="l">Sindicalizados</div><div class="v">'+DATA.filter(c=>+c.union>0).length+'</div><div class="sub">requieren convenio Art. 59</div></div>'));
  wrap.appendChild(k);
  // cluster progress
  const clusters=[...new Set(DATA.map(c=>c.cluster))];
  const cp=el('<div class="panel"><div class="ph"><h2>Avance por cluster</h2><span class="hint">% promedio de preparación</span></div></div>');
  const cpb=el('<div style="padding:6px 16px 14px"></div>');
  clusters.forEach(cl=>{const cs=DATA.filter(c=>c.cluster===cl);const p=Math.round(cs.reduce((a,c)=>a+pct(c),0)/cs.length);
    const row=el('<div style="display:flex;align-items:center;gap:12px;padding:7px 0"><div style="width:90px;font-weight:600;font-size:12.5px">'+cl+'</div><div class="mini" style="flex:1"><i style="width:'+p+'%;background:'+(p>=100?'var(--ok)':p>0?'var(--warn)':'var(--slate)')+'"></i></div><div class="num" style="width:42px">'+p+'%</div><div class="small" style="width:70px">'+cs.length+' plantas</div></div>');
    cpb.appendChild(row);});
  cp.appendChild(cpb);wrap.appendChild(cp);
  // filters + table
  const fl=el('<div class="filters"></div>');
  const q=el('<input placeholder="Buscar cliente, cluster o BD…" />');q.value=STATE.q;q.oninput=e=>{STATE.q=e.target.value;rerenderTable();};
  const selC=el('<select><option value="">Todos los clusters</option>'+clusters.map(c=>'<option '+(STATE.filterCluster===c?'selected':'')+'>'+c+'</option>').join('')+'</select>');
  selC.onchange=e=>{STATE.filterCluster=e.target.value;rerenderTable();};
  fl.appendChild(q);fl.appendChild(selC);
  ['','Sin iniciar','En progreso','Completo'].forEach(s=>{const c=el('<div class="chip '+(STATE.filterStatus===s?'on':'')+'">'+(s||'Todos')+'</div>');c.onclick=()=>{STATE.filterStatus=s;rerenderTable();};fl.appendChild(c);});
  wrap.appendChild(fl);
  const tp=el('<div class="panel"><div id="tblHost"></div></div>');
  wrap.appendChild(tp);
  setTimeout(rerenderTable,0);
  return wrap;
}
function filteredClients(){
  return DATA.filter(c=>{
    if(STATE.filterCluster&&c.cluster!==STATE.filterCluster)return false;
    if(STATE.filterStatus&&statusOf(c)!==STATE.filterStatus)return false;
    if(STATE.q){const q=STATE.q.toLowerCase();if(!((c.name+' '+c.cluster+' '+(c.bd||'')).toLowerCase().includes(q)))return false;}
    return true;
  });
}
function rerenderTable(){
  const host=document.getElementById('tblHost');if(!host)return;
  const list=filteredClients().sort((a,b)=>a.cluster.localeCompare(b.cluster,'es')||a.name.localeCompare(b.name,'es'));
  let rows='';let lastClu=null;
  list.forEach(c=>{const r=calcClient(c,STATE.year);const p=pct(c);const st=statusOf(c);
    if(c.cluster!==lastClu){lastClu=c.cluster;
      const cluCs=list.filter(x=>x.cluster===c.cluster);

function risk(o){let s=0;s+=(100-o.p);if(+o.c.union>0&&!(o.c.checks&&o.c.checks.conv))s+=60;s+=Math.min(40,o.c.hc/10);if(o.r.hasGap)s+=20;if(!o.r.otFeasibleAll&&o.r.hasGap)s+=25;return s;}

const DAYNAMES=['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
function evenDays(H,D){D=+D||5;return Array(D).fill(r1(H/D));}
function distDays(Hc,Ht,D,key){
  const cd=Hc/D;
  if(key==='corto'){let last=r1(Ht-r1(cd)*(D-1));if(last>0.05&&last<=cd+0.06)return [...Array(D-1).fill(r1(cd)),last];}

  return Array(D).fill(r1(Ht/D));               // parejo (default)
}
function dayExitMin(start,oh,mealMin,counts){return counts?start+oh*60:start+oh*60+mealMin;}
function prodWeek(daysArr,mealMin,counts){return counts?daysArr.reduce((a,b)=>a+b,0)-(mealMin/60)*daysArr.length:daysArr.reduce((a,b)=>a+b,0);}
function scheduleTable(start,daysArr,mealMin,counts,restCount){
  const D=daysArr.length,R=restCount||0,N=D+R+1;
  let cg='<colgroup>';for(let i=0;i<N-1;i++)cg+='<col style="width:'+(100/(N)).toFixed(2)+'%">';cg+='<col style="width:'+(100/N).toFixed(2)+'%"></colgroup>';
  let hh='<tr class="sdh">',hr='<tr class="hr">',tm='<tr class="tm">';
  const tot=r1(daysArr.reduce((a,b)=>a+b,0));
  for(let i=0;i<D;i++){
    const oh=daysArr[i];const exit=dayExitMin(start,oh,mealMin,counts);
    const cls=oh>12.001?'bad':oh>10.5?'over':'';
    hh+='<th>'+(DAYNAMES[i]||('D'+(i+1)))+'</th>';
    hr+='<td class="'+cls+'">'+r1(oh)+'</td>';
    tm+='<td>'+fmtClock(start)+'–'+fmtClock(exit)+'</td>';
  }
  for(let i=0;i<R;i++){hh+='<th>'+(DAYNAMES[D+i]||'')+'</th>';hr+='<td class="rest">desc.</td>';tm+='<td class="rest">—</td>';}
  hh+='<th>Total</th>';hr+='<td class="tot">'+tot+'</td>';tm+='<td class="tot"></td>';
  return el('<table class="sched">'+cg+'<thead>'+hh+'</tr></thead><tbody>'+hr+'</tr>'+tm+'</tr></tbody></table>');
}
function genComments(c,s,year,daysArr,mealKind){

  if(mealKind==='A'){const prod=r1(Ht-0.5*D);out.push({sev:'warn',txt:'Comida 30 min: por criterio legal computa como tiempo trabajado, va dentro de la jornada. De '+Ht+' h, '+prod+' h son productivas (pierdes '+r1(0.5*D)+' h/sem por trabajador, ≈'+Math.round(0.5*D/Ht*100)+'%).'});}

}

function loadSheetJS(){
  return new Promise((res,rej)=>{
    if(window.XLSX)return res(window.XLSX);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX);s.onerror=()=>rej(new Error('sin conexión a la librería de lectura de Excel'));
    document.head.appendChild(s);
  });
}
async function readWorkbook(f){
  if(/\.csv$/i.test(f.name)){
    const txt=await f.text();
    const lines=txt.split(/\r?\n/).filter(l=>l.trim());
    const hdr=splitCSV(lines[0]);
    return lines.slice(1).map(l=>{const cs=splitCSV(l);const o={};hdr.forEach((h,i)=>o[h.trim().toLowerCase()]=cs[i]);return o;});
  }
  const XLSX=await loadSheetJS();
  const buf=await f.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const arr=XLSX.utils.sheet_to_json(ws,{defval:''});
  return arr.map(o=>{const n={};Object.keys(o).forEach(k=>n[String(k).trim().toLowerCase()]=o[k]);return n;});
}
function splitCSV(l){const out=[];let cur='',q=false;for(const ch of l){if(ch==='"'){q=!q;continue;}if(ch===','&&!q){out.push(cur);cur='';continue;}cur+=ch;}out.push(cur);return out;}
function pickCol(row,cands){const ks=Object.keys(row);for(const c of cands){const k=ks.find(k=>k.includes(c));if(k)return k;}return null;}
function summarizeTress(rows){
  if(!rows.length)throw new Error('el archivo no tiene filas');
  const kSal=pickCol(rows[0],['salario','sueldo','sd ','sdi','diario']);
  const kCls=pickCol(rows[0],['clasific','tipo','categor','dl']);
  const kDep=pickCol(rows[0],['depart','depto','área','area']);
  const kTur=pickCol(rows[0],['turno','jornada','horario']);
  if(!kSal)throw new Error('no encontré la columna de salario diario');
  const bands={dl:{n:0,sum:0},idl:{n:0,sum:0},ger:{n:0,sum:0},otros:{n:0,sum:0}};
  const deptos={},turnos={};
  rows.forEach(r=>{
    const sal=parseFloat(String(r[kSal]).replace(/[$,\s]/g,''))||0;
    const cls=String(kCls?r[kCls]:'').toUpperCase();
    let b;
    if(sal>=3000)b='ger';
    else if(/\bIDL\b|INDIRECT/.test(cls))b='idl';
    else if(/\bDL\b|DIRECT/.test(cls))b='dl';
    else b=(sal>=900&&sal<=2500)?'idl':(sal>0&&sal<900?'dl':'otros');
    bands[b].n++;bands[b].sum+=sal;
    if(kDep&&r[kDep])deptos[r[kDep]]=(deptos[r[kDep]]||0)+1;
    if(kTur&&r[kTur])turnos[r[kTur]]=(turnos[r[kTur]]||0)+1;
  });
  return {total:rows.length,bands,nDeptos:Object.keys(deptos).length,nTurnos:Object.keys(turnos).length,cols:{sal:kSal,cls:kCls,dep:kDep,tur:kTur}};
}

/* ---------- Calculadora de Jornada Legal (propuestas de cliente) ---------- */
const JC_DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const JC_STATE={};
function jcDefault(){return{code:'Propuesta',hc:10,meal:60,fuera:true,days:[
  {on:true,in:'07:00',out:'17:00'},{on:true,in:'07:00',out:'17:00'},{on:true,in:'07:00',out:'17:00'},
  {on:true,in:'07:00',out:'17:00'},{on:true,in:'07:00',out:'15:00'},{on:false,in:'07:00',out:'15:00'},{on:false,in:'07:00',out:'15:00'}]};}
function jcEval(st){
  const rows=[];let total=0;let cls='Diurna';const order={Diurna:0,Mixta:1,Nocturna:2};
  const mealExcl=st.fuera&&st.meal>=60; // solo se excluye si sale de planta Y es ≥1h continua
  st.days.forEach((d,i)=>{ if(!d.on)return;
    const s=parseStart(d.in);let e=parseStart(d.out);if(e<=s)e+=1440;
    const pres=(e-s)/60;
    const eff=Math.max(0,pres-(mealExcl?st.meal/60:0));
    const dcls=classifyShift(s,e);
    if(order[dcls]>order[cls])cls=dcls;
    total+=eff;
    rows.push({i,name:JC_DAYS[i],in:d.in,out:fmtClock(e%1440),pres,eff,cls:dcls,over12:pres>12.0001,cont:mealExcl?'Discontinua':'Continua'});
  });
  total=Math.round(total*100)/100;
  const issues=[];const add=(sev,art,txt)=>issues.push({sev,art,txt});
  if(!rows.length)return{rows,total:0,cls,issues,years:{}};
  if(st.meal<30)add('bad','Art. 63 LFT','El descanso de comida es menor a 30 minutos — mínimo legal: media hora.');
  if(st.fuera&&st.meal<60)add('warn','Art. 63-64 LFT','Marcaste jornada discontinua pero la comida es <1 h. Criterio vigente: para excluirse del tiempo trabajado debe ser de al menos 1 hora continua y el personal debe salir de la planta. Se está computando como trabajada.');
  if(!st.fuera)add('info','Art. 64 LFT','El personal permanece en planta durante la comida → la comida COMPUTA como tiempo trabajado (jornada continua).');
  if(rows.length>=7)add('bad','Art. 69 LFT','7 días de trabajo sin día de descanso — por cada 6 días de trabajo corresponde al menos 1 de descanso.');
  const d12=rows.filter(r=>r.over12);
  if(d12.length)add('bad','Reforma 2026 (agregado 12 h)','Presencia mayor a 12 h el '+d12.map(r=>r.name+' ('+r1(r.pres)+'h)').join(', ')+' — el total de horas ordinarias + extras en un mismo día no puede exceder 12 h.');
  const mixDN=rows.some(r=>r.cls==='Nocturna')&&rows.some(r=>r.cls==='Diurna');
  if(mixDN)add('warn','Art. 60 LFT','La semana mezcla días diurnos y nocturnos — se aplica el tope de la clasificación más restrictiva ('+cls+'). Verifica que sea intencional.');
  const years={};
  [2027,2028,2029,2030].forEach(y=>{
    const cap=RAMP[cls][y];const exc=Math.max(0,Math.round((total-cap)*100)/100);
    const otcap=OTCAP[y];const yi=[];
    let verdict,vc;
    if(exc<=0.0001){verdict='LEGAL';vc='ok';}
    else if(exc<=otcap){verdict='LEGAL CON OT DOBLE';vc='warn';
      yi.push(exc+' h/sem por persona como tiempo extra doble (tope '+y+': '+otcap+' h/sem, máx 4 h/día en máx 4 días — Art. 66 y reforma).');}
    else if(exc<=otcap+4){verdict='LÍMITE — REQUIERE OT TRIPLE';vc='warn';
      yi.push(otcap+' h dobles + '+r1(exc-otcap)+' h TRIPLES por persona (tope triple: 4 h/sem — Art. 68). Zona de alto costo y alto riesgo de inspección.');}
    else{verdict='VIOLACIÓN';vc='bad';
      yi.push('Exceden '+r1(exc-otcap-4)+' h/sem aún agotando OT doble y triple — la estructura NO es legalizable en '+y+' (Arts. 61, 66-68 y transitorios de la reforma). Hay que rediseñar el horario o crecer plantilla.');}
    years[y]={cap,exc,verdict,vc,notes:yi};
  });
  return{rows,total,cls,issues,years,mealExcl};
}

function fldPre(label,key,val,c,pre,isFactor){const w=el('<div class="fld"><label>'+label+'</label><div class="pre"><span>'+pre+'</span></div></div>');const i=el('<input type="number" step="'+(isFactor?'0.01':'0.01')+'"/>');i.value=val;i.oninput=e=>{c[key]=e.target.value===''?(isFactor?0.35:null):+e.target.value;persistDebounced(c);computeIfOpen(c);};w.querySelector('.pre').appendChild(i);return w;}
function tdInput(c,i,key,val,type,w,cb){const td=el('<td></td>');const inp=el('<input type="'+type+'" style="max-width:'+w+'px"/>');inp.value=val;inp.oninput=e=>{c.shifts[i][key]=type==='number'?(e.target.value===''?'':+e.target.value):e.target.value;persistDebounced(c);computeIfOpen(c);if(cb)cb();};td.appendChild(inp);return td;}
function computeIfOpen(c){const d=document.querySelector('.draw');if(d)computeBlocks(c,d);}
let pdt=null;function persistDebounced(c){clearTimeout(pdt);pdt=setTimeout(()=>persist(c),500);}
function persist(c){saveClient(c);}

/* ---------- diagnóstico global: cualquier error de JS se muestra en pantalla ---------- */
window.addEventListener('error',function(e){
  try{
    let b=document.getElementById('errBanner');
    if(!b){b=document.createElement('div');b.id='errBanner';
      b.style.cssText='position:fixed;bottom:12px;left:12px;right:12px;z-index:9999;background:#FBEAE7;border:1px solid #BC1401;color:#9A1001;padding:10px 14px;border-radius:8px;font:12px/1.5 monospace;max-height:140px;overflow:auto;box-shadow:0 6px 20px rgba(0,0,0,.15)';
      document.body.appendChild(b);}
    b.innerHTML='<b>⚠️ Error de JavaScript</b> — comparte este texto: '+String(e.message).replace(/</g,'&lt;')+' <i>(línea '+e.lineno+')</i> <span style="float:right;cursor:pointer" onclick="this.parentNode.remove()">✕</span>';
  }catch(_){}
});
applyZoom(getZoom());
(async function(){
  try{await load();}
  catch(err){
    console.error('Fallo en load():',err);
    try{DATA=JSON.parse(JSON.stringify(SEED.clients));normalizeShifts();DATA_SRC_LABEL='Turnos: seed local (error de carga)';}catch(_){}
    window.dispatchEvent(new ErrorEvent('error',{message:'load(): '+(err&&err.message||err),lineno:0}));
  }
  render();
})();
</script></body></html>
